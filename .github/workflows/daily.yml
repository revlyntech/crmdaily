name: CRM Daily — Auto Publish Article

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC — every day including weekends
    - cron: '30 2 * * *'
  workflow_dispatch:

jobs:
  publish-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r automation/requirements.txt

      - name: Run automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python automation/main.py

      - name: Done
        run: echo "✅ Article published at $(date)"