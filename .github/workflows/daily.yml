name: CRM Daily — Auto Publish Article

on:
  schedule:
    # 8:00 AM IST = 2:30 AM UTC — Monday to Friday only
    - cron: '30 2 * * 1-5'
  workflow_dispatch:  # manual trigger from GitHub Actions tab

jobs:
  publish-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r automation/requirements.txt

      - name: Run automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          cd automation
          python main.py

      - name: Done
        run: echo "✅ Article published at $(date)"