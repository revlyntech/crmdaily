name: CRM Daily - Auto Publish Article

on:
  schedule:
    - cron: '30 2 * * *'   # 8:00 AM IST every day
    - cron: '30 12 * * *'  # 6:00 PM IST every day
  workflow_dispatch:

jobs:
  publish-article:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --no-cache-dir -r automation/requirements.txt

      - name: Run automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          BEEHIIV_API_KEY:   ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUB_ID:    ${{ secrets.BEEHIIV_PUB_ID }}
        run: python automation/main.py

      - name: Commit dedup and category logs
        run: |
          git config user.name "CRM Daily Bot"
          git config user.email "bot@crmdaily.co"
          cp automation/published_titles.json . 2>/dev/null || true
          cp automation/category_log.json . 2>/dev/null || true
          git add -f automation/published_titles.json automation/category_log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: update dedup + category logs [skip ci]"
          git push origin main || true

      - name: Done
        run: echo "✅ Done at $(date)"